version: '3.8'

# 🐳 CONTAINER NAMING: All containers start with 'ia-'
# Generated: Apr 13, 2026
# Portainer Token: ptr_yrEIS3/ZQKfYtJkcYc97dN4u0XPDpvY9TRFmtU3cNn0=

services:
  linkedin-api:
    image: punteria/linkedin-api:latest
    container_name: ia-linkedin-api
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    restart: unless-stopped
    networks:
      - default
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 8000), timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

volumes:
  config:
  data:
  logs:

networks:
  default:
    driver: bridge
