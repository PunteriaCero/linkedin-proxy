name: 🐳 Build and Push Docker Image

on:
  push:
    branches:
      - master
    paths:
      - 'Dockerfile'
      - 'requirements.txt'
      - 'main.py'
      - '.github/workflows/build-docker-image.yml'
  workflow_dispatch:
    inputs:
      push_image:
        description: 'Push image to DockerHub'
        required: false
        default: 'true'

env:
  REGISTRY: docker.io
  IMAGE_NAME: linkedin-api

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PAT }}
        continue-on-error: false

      - name: 🔍 Verify secrets
        run: |
          if [ -z "${{ secrets.DOCKER_USER }}" ]; then
            echo "❌ ERROR: DOCKER_USER secret not configured"
            exit 1
          fi
          if [ -z "${{ secrets.DOCKER_PAT }}" ]; then
            echo "❌ ERROR: DOCKER_PAT secret not configured"
            exit 1
          fi
          echo "✅ Secrets verified"
          echo "   Username: ${{ secrets.DOCKER_USER }}"
          echo "   PAT: (hidden)"

      - name: 📊 Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ secrets.DOCKER_USER }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest

      - name: 🏗️ Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ secrets.DOCKER_USER }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ secrets.DOCKER_USER }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
        continue-on-error: false

      - name: 📋 Deployment summary
        if: success()
        run: |
          echo "════════════════════════════════════════════════════"
          echo "✅ DOCKER IMAGE BUILD & PUSH - SUCCESS"
          echo "════════════════════════════════════════════════════"
          echo ""
          echo "🐳 Image Details:"
          echo "   • Registry: ${{ env.REGISTRY }}"
          echo "   • Username: ${{ secrets.DOCKER_USER }}"
          echo "   • Image: ${{ env.IMAGE_NAME }}"
          echo "   • Tags: latest, ${{ github.sha }}"
          echo ""
          echo "🌐 Full Image:"
          echo "   ${{ env.REGISTRY }}/${{ secrets.DOCKER_USER }}/${{ env.IMAGE_NAME }}:latest"
          echo ""
          echo "📊 Metadata:"
          echo "   Tags: ${{ steps.meta.outputs.tags }}"
          echo "   Labels: ${{ steps.meta.outputs.labels }}"
          echo ""
          echo "🌐 DockerHub:"
          echo "   https://hub.docker.com/r/${{ secrets.DOCKER_USER }}/${{ env.IMAGE_NAME }}"
          echo ""
          echo "🚀 Next Steps:"
          echo "   1. Portainer pulls image automatically"
          echo "   2. Update docker-compose to use DockerHub image"
          echo "   3. Deploy via Portainer"
          echo ""
          echo "════════════════════════════════════════════════════"

      - name: ❌ Build failure diagnostics
        if: failure()
        run: |
          echo "════════════════════════════════════════════════════"
          echo "❌ DOCKER IMAGE BUILD FAILED"
          echo "════════════════════════════════════════════════════"
          echo ""
          echo "Debug Information:"
          echo "   • Workflow: ${{ github.workflow }}"
          echo "   • Job: ${{ github.job }}"
          echo "   • Commit: ${{ github.sha }}"
          echo "   • Branch: ${{ github.ref }}"
          echo "   • Actor: ${{ github.actor }}"
          echo ""
          echo "Check logs above for detailed error messages"
          echo ""
          echo "Common Issues:"
          echo "   1. Dockerfile syntax errors"
          echo "   2. Missing files in context"
          echo "   3. Docker Hub authentication failed"
          echo "   4. Insufficient disk space in runner"
          echo ""
          echo "═════════════════════════════════════════════════════"

  notify:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: ✅ Build success notification
        if: needs.build.result == 'success'
        run: |
          echo "════════════════════════════════════════════════════"
          echo "✅ BUILD PIPELINE - SUCCESS"
          echo "════════════════════════════════════════════════════"
          echo ""
          echo "Docker image successfully built and pushed to DockerHub"
          echo "Ready for Portainer deployment"
          echo ""
          echo "════════════════════════════════════════════════════"

      - name: ❌ Build failure notification
        if: needs.build.result != 'success'
        run: |
          echo "════════════════════════════════════════════════════"
          echo "❌ BUILD PIPELINE - FAILED"
          echo "════════════════════════════════════════════════════"
          echo ""
          echo "Docker image build failed. Check workflow logs for details."
          echo ""
          echo "https://github.com/PunteriaCero/linkedin-proxy/actions"
          echo ""
          echo "════════════════════════════════════════════════════"
          exit 1
