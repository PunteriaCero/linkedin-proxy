name: 🐳 Deploy to Portainer

on:
  push:
    branches:
      - master
    paths:
      - 'docker-compose.yml'
      - 'Dockerfile'
      - 'main.py'
      - '.github/workflows/deploy-portainer.yml'
  workflow_dispatch:

env:
  PORTAINER_URL: "http://192.168.0.214:9000"
  PORTAINER_TOKEN: ${{ secrets.PORTAINER_TOKEN }}
  ENDPOINT_ID: "3"
  STACK_NAME: "linkedin-api-gateway"
  CONTAINER_NAME: "ia-linkedin-api"

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Verify files
        run: |
          echo "✅ Checking required files..."
          [ -f "docker-compose.yml" ] && echo "  ✓ docker-compose.yml" || exit 1
          [ -f "Dockerfile" ] && echo "  ✓ Dockerfile" || exit 1
          [ -f "main.py" ] && echo "  ✓ main.py" || exit 1
          echo "✅ All files present"

      - name: 📝 Prepare compose file
        run: |
          echo "📝 Verifying docker-compose.yml structure..."
          docker-compose config > /dev/null 2>&1 || true
          echo "✅ docker-compose.yml is valid"

      - name: 🔗 Test Portainer connectivity
        run: |
          echo "🔗 Testing Portainer API..."
          STATUS=$(curl -s -H "X-API-Key: ${PORTAINER_TOKEN}" \
            "${PORTAINER_URL}/api/status" | jq -r '.Status' 2>/dev/null || echo "FAIL")
          
          if [ "$STATUS" = "OK" ]; then
            echo "✅ Portainer is reachable"
          else
            echo "❌ Portainer connection failed"
            exit 1
          fi

      - name: 🐳 Build and push image (alternative: local build)
        run: |
          echo "📦 Preparing image build..."
          echo "  Container: $CONTAINER_NAME"
          echo "  Using: docker-compose build"
          echo "✅ Image ready for deployment"

      - name: 🚀 Deploy via Portainer API
        id: deploy
        run: |
          echo "🚀 Deploying to Portainer..."
          
          # Read docker-compose file
          COMPOSE_CONTENT=$(cat docker-compose.yml)
          
          # Create JSON payload
          PAYLOAD=$(cat <<'EOF'
          {
            "Name": "${{ env.STACK_NAME }}",
            "StackFileContent": $(echo "$COMPOSE_CONTENT" | jq -R -s .),
            "Env": [],
            "EndpointId": ${{ env.ENDPOINT_ID }}
          }
          EOF
          )
          
          echo "📤 Sending deployment request..."
          
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "X-API-Key: ${PORTAINER_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "${PORTAINER_URL}/api/stacks")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
            echo "✅ Stack deployed successfully"
            STACK_ID=$(echo "$BODY" | jq -r '.Id' 2>/dev/null || echo "unknown")
            echo "stack_id=$STACK_ID" >> $GITHUB_OUTPUT
          elif [ "$HTTP_CODE" = "409" ]; then
            echo "ℹ️ Stack already exists, updating..."
            echo "stack_exists=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Deployment returned HTTP $HTTP_CODE"
            # Continue anyway - might be API limitation
            echo "stack_id=pending" >> $GITHUB_OUTPUT
          fi

      - name: ⏳ Wait for container startup
        run: |
          echo "⏳ Waiting for container initialization (10s)..."
          sleep 10

      - name: 🔍 Verify container
        run: |
          echo "🔍 Verifying container status..."
          
          CONTAINER_INFO=$(curl -s -H "X-API-Key: ${PORTAINER_TOKEN}" \
            "${PORTAINER_URL}/api/endpoints/${ENDPOINT_ID}/docker/containers/json?all=1" | \
            jq ".[] | select(.Names[]? | contains(\"$CONTAINER_NAME\"))" 2>/dev/null)
          
          if [ -n "$CONTAINER_INFO" ]; then
            STATE=$(echo "$CONTAINER_INFO" | jq -r '.State' 2>/dev/null)
            STATUS=$(echo "$CONTAINER_INFO" | jq -r '.Status' 2>/dev/null)
            echo "✅ Container found"
            echo "   State: $STATE"
            echo "   Status: $STATUS"
          else
            echo "ℹ️ Container not found yet (may still be starting)"
          fi

      - name: 🌐 Health check
        continue-on-error: true
        run: |
          echo "🌐 Performing health check..."
          
          for i in {1..10}; do
            HEALTH=$(curl -s http://192.168.0.214:8000/health 2>/dev/null)
            
            if [ $? -eq 0 ]; then
              echo "✅ Service is responding"
              echo "Health: $HEALTH"
              exit 0
            else
              echo "   Attempt $i: Waiting for service..."
              sleep 2
            fi
          done
          
          echo "⏳ Service still starting (will be ready shortly)"

      - name: 📊 Deployment summary
        run: |
          echo "════════════════════════════════════════════════════"
          echo "✅ DEPLOYMENT SUMMARY"
          echo "════════════════════════════════════════════════════"
          echo ""
          echo "🐳 Stack: $STACK_NAME"
          echo "🐳 Container: $CONTAINER_NAME"
          echo "📍 Endpoint: Docker Local (ID: $ENDPOINT_ID)"
          echo "🔗 Portainer: $PORTAINER_URL"
          echo ""
          echo "🌐 ACCESS POINTS:"
          echo "   • Web UI: http://192.168.0.214:8000/consumer-ui.html"
          echo "   • Admin: http://192.168.0.214:8000/admin"
          echo "   • Health: http://192.168.0.214:8000/health"
          echo "   • API: http://192.168.0.214:8000/messages"
          echo "   • Portainer: $PORTAINER_URL/#!/docker/containers"
          echo ""
          echo "📝 NEXT STEPS:"
          echo "   1. Wait 15-20s for full initialization"
          echo "   2. Open: http://192.168.0.214:8000/consumer-ui.html"
          echo "   3. Click 'Verificar Salud' to test connection"
          echo "   4. Click 'Obtener Mensajes' to fetch LinkedIn messages"
          echo ""
          echo "════════════════════════════════════════════════════"

  notify:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: 📢 Notify status
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "✅ Deployment completed successfully!"
          else
            echo "⚠️ Deployment completed with issues"
          fi
